name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # System libs PySide6 needs to import / render under the offscreen QPA.
      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libxkbcommon0 libegl1 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1

      - name: Install package + dev/desktop extras
        run: python -m pip install -e ".[dev,desktop]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest, offscreen)
        run: pytest
